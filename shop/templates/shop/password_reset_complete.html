{% extends "shop/base.html" %}

{% block content %}


<style>
/* MOBILE PASSWORD RESET PAGES */
@media (max-width: 900px) {

    .filter-box {
        display: none !important;
    }

    div[style*="max-width: 520px"],
    div[style*="max-width: 540px"],
    div[style*="max-width: 560px"] {
        width: 100% !important;
        max-width: 430px !important;
        box-sizing: border-box !important;
        margin: 18px auto !important;
        padding: 0 12px !important;
    }

    div[style*="box-shadow"] {
        padding: 20px !important;
        border-radius: 12px !important;
        border: 1px solid #ddd !important;
        box-shadow: 0 3px 12px rgba(0,0,0,0.10) !important;
    }

    h2 {
        font-size: 23px !important;
        line-height: 29px !important;
        text-align: center !important;
        color: #222 !important;
    }

    p {
        font-size: 15px !important;
        line-height: 23px !important;
    }

    label {
        font-size: 15px !important;
        margin-bottom: 6px !important;
    }

    input[type="email"],
    input[type="password"] {
        width: 100% !important;
        box-sizing: border-box !important;
        padding: 12px !important;
        border: 1px solid #888 !important;
        border-radius: 8px !important;
        font-size: 16px !important;
        background: white !important;
        outline: none !important;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
        border-color: #1597e5 !important;
        box-shadow: 0 0 0 3px rgba(21,151,229,0.18) !important;
    }

    button[type="submit"],
    a[style*="background: #222"] {
        width: 100% !important;
        box-sizing: border-box !important;
        display: block !important;
        text-align: center !important;
        padding: 12px !important;
        border: 0 !important;
        border-radius: 22px !important;
        background: #1597e5 !important;
        color: white !important;
        font-size: 16px !important;
        font-weight: bold !important;
        text-decoration: none !important;
    }

    div[style*="background: #f8f8f8"] {
        font-size: 14px !important;
        line-height: 22px !important;
        border-radius: 8px !important;
        padding: 12px !important;
    }

    div[style*="width: 58px"] {
        width: 52px !important;
        height: 52px !important;
        font-size: 24px !important;
        margin-bottom: 14px !important;
    }
}
</style>

<div style="max-width: 540px; margin: 50px auto; padding: 0 15px;">

    <div style="
        background: #ffffff;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        padding: 30px;
        font-family: Arial, sans-serif;
        text-align: center;
    ">

        <div style="
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #f1f7f1;
            border: 1px solid #cfe6cf;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px auto;
            color: #247a24;
            font-size: 28px;
            font-weight: bold;
        ">
            ✓
        </div>

        <h2 style="margin: 0 0 12px 0; color: #222; font-size: 24px;">
            Şifreniz Güncellendi
        </h2>

        <p style="color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 22px;">
            Şifreniz başarıyla değiştirildi. Artık yeni şifrenizle giriş yapabilirsiniz.
        </p>

        <a href="{% url 'login' %}" style="
            display: inline-block;
            background: #222;
            color: white;
            padding: 12px 22px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        ">
            Giriş Yap
        </a>

    </div>

</div>
{% endblock %}
