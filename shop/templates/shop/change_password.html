{% extends "shop/base.html" %}

{% block content %}


<style>
/* MOBILE CHANGE PASSWORD PAGE */
@media (max-width: 900px) {

    .filter-box {
        display: none !important;
    }

    div[style*="width:600px"] {
        width: 100% !important;
        max-width: 430px !important;
        box-sizing: border-box !important;
        margin: 18px auto !important;
        padding: 18px !important;
        border: 1px solid #ddd !important;
        border-radius: 12px !important;
        box-shadow: 0 3px 12px rgba(0,0,0,0.10) !important;
    }

    h2 {
        text-align: center !important;
        font-size: 24px !important;
        color: #222 !important;
        border-bottom: 2px solid #d6a600 !important;
        padding-bottom: 12px !important;
        margin-bottom: 18px !important;
    }

    form table,
    form tbody,
    form tr,
    form td {
        display: block !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    form td {
        padding: 6px 0 !important;
    }

    form td[style*="font-weight:bold"] {
        font-size: 16px !important;
        color: #333 !important;
        margin-top: 8px !important;
    }

    input[type="password"] {
        width: 100% !important;
        box-sizing: border-box !important;
        padding: 12px !important;
        border: 1px solid #888 !important;
        border-radius: 8px !important;
        font-size: 16px !important;
        background: #fff !important;
        outline: none !important;
    }

    input[type="password"]:focus {
        border-color: #1597e5 !important;
        box-shadow: 0 0 0 3px rgba(21,151,229,0.18) !important;
    }

    button[type="submit"] {
        width: 100% !important;
        height: auto !important;
        padding: 12px !important;
        border: 0 !important;
        border-radius: 22px !important;
        background: #1597e5 !important;
        color: white !important;
        font-size: 16px !important;
        font-weight: bold !important;
        margin-top: 10px !important;
    }

    div[style*="background:#ffd6d6"],
    div[style*="background:#d6ffd6"] {
        border-radius: 8px !important;
        font-size: 15px !important;
        line-height: 21px !important;
    }

    div[style*="margin-top:25px"] {
        text-align: center !important;
        margin-top: 20px !important;
    }

    div[style*="margin-top:25px"] a {
        display: inline-block !important;
        padding: 10px 18px !important;
        border: 1px solid #d6a600 !important;
        border-radius: 20px !important;
        color: #111 !important;
        background: #fff8d6 !important;
        text-decoration: none !important;
        font-weight: bold !important;
        font-size: 15px !important;
    }
}
</style>


<div style="width:600px; margin:0 auto; background:white; padding:20px; font-family:Arial;">

    <h2 style="border-bottom:1px solid #ccc; padding-bottom:10px;">
        Şifre Değiştir
    </h2>

    {% if error %}
        <div style="background:#ffd6d6; color:#900; padding:10px; margin-bottom:15px;">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div style="background:#d6ffd6; color:#060; padding:10px; margin-bottom:15px;">
            {{ success }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <table style="width:100%; font-size:16px;">

            <tr>
                <td style="width:180px; font-weight:bold;">Mevcut Şifre</td>
                <td>
                    <input type="password" name="old_password" style="width:250px;">
                </td>
            </tr>

            <tr>
                <td style="font-weight:bold; padding-top:15px;">Yeni Şifre</td>
                <td style="padding-top:15px;">
                    <input type="password" name="new_password1" style="width:250px;">
                </td>
            </tr>

            <tr>
                <td style="font-weight:bold; padding-top:15px;">Yeni Şifre Tekrar</td>
                <td style="padding-top:15px;">
                    <input type="password" name="new_password2" style="width:250px;">
                </td>
            </tr>

            <tr>
                <td></td>
                <td style="padding-top:25px;">
                    <button type="submit" style="width:160px; height:30px;">
                        Şifreyi Değiştir
                    </button>
                </td>
            </tr>

        </table>
    </form>

    <div style="margin-top:25px;">
        <a href="{% url 'account' %}">
            Hesabıma Geri Dön
        </a>
    </div>

</div>

{% endblock %}
